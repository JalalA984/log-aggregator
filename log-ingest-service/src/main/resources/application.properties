spring.application.name=log-ingest-service

server.port=8090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/log_aggregator?createDatabaseIfNotExist=true
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.format_sql=true

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# WebClient timeout configuration
spring.webflux.client.max-in-memory-size=10MB