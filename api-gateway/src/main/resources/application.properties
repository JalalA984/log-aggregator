 spring.application.name=api-gateway

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Gateway routes
spring.cloud.gateway.server.webflux.routes[0].id=log-ingest-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://LOG-INGEST-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/ingest/**

spring.cloud.gateway.server.webflux.routes[1].id=log-query-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://LOG-QUERY-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/query/**

# Enable actuator endpoints
management.endpoints.web.exposure.include=health,gateway,routes
management.endpoint.gateway.enabled=true
management.endpoint.health.enabled=true

# For debugging
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.cloud.loadbalancer=DEBUG

# Optional: Add CORS configuration for web dashboard (we'll add later)
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*